<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HUMAN 544</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    canvas { display:block; }

    /* ── HUD in-game ── */
    #hud {
      position:fixed; top:0; left:50%; transform:translateX(-50%);
      width:1280px; height:720px; pointer-events:none;
      font-family:monospace; color:#fff;
    }
    #hud-health { position:absolute; top:14px; left:18px; font-size:22px; letter-spacing:4px; }
    #hud-coins  { position:absolute; top:14px; right:60px; font-size:14px; font-weight:bold; color:#ffc400; }
    #hud-level  { position:absolute; top:14px; left:50%; transform:translateX(-50%); font-size:11px; color:#8899aa; }
    #hud-msg    {
      position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
      font-size:13px; font-weight:bold; background:rgba(0,0,0,0.65);
      padding:6px 18px; border-radius:8px; opacity:0; transition:opacity 0.35s;
      white-space:nowrap; pointer-events:none;
    }
    #hud-room   { position:absolute; top:36px; right:60px; font-size:10px; color:#445566; }

    /* ── Barra de Habilidade Especial ── */
    #hud-ability-wrap {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      width:180px; height:14px; background:rgba(0,0,0,0.5);
      border:1px solid #224466; border-radius:7px; overflow:hidden;
    }
    #hud-ability { height:100%; width:0%; background:#0088ff; transition:width 0.2s, background 0.3s; border-radius:7px; }
    #hud-ability-label {
      position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
      font-size:11px; color:#4499ff; font-family:monospace; white-space:nowrap;
    }
    #hud-xp {
      position:absolute; top:36px; left:18px; font-size:10px; color:#335544;
    }

    /* ── Botão Pausa ── */
    #pause-btn {
      display:none; position:fixed; top:8px; right:8px;
      background:rgba(0,0,0,0.65); color:#aabbcc; border:1px solid #334455;
      font-family:monospace; font-size:15px; cursor:pointer;
      padding:4px 11px; border-radius:6px; z-index:200;
    }
    #pause-btn:hover { background:rgba(20,40,80,0.9); color:#fff; }

    /* ── Overlay Pausa ── */
    #pause-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.80);
      z-index:500; align-items:center; justify-content:center; flex-direction:column;
      font-family:monospace;
    }
    #pause-overlay.active { display:flex; }
    #pause-overlay h2   { color:#fff; font-size:28px; margin-bottom:16px; letter-spacing:2px; }
    #pause-overlay .p-btn {
      display:block; width:250px; margin:7px auto; padding:10px 0;
      background:#0d1122; color:#4488ff; border:1px solid #2a3d66;
      font-family:monospace; font-size:15px; cursor:pointer; border-radius:7px; letter-spacing:1px;
    }
    #pause-overlay .p-btn:hover { background:#1a2d55; color:#fff; }
    #pause-overlay .p-btn.danger { color:#ff5555; border-color:#551111; }
    #pause-overlay .p-btn.danger:hover { background:#441111; }
    #pause-room-info { color:#4488aa; font-size:11px; margin:10px 0 2px; text-align:center; }
    #pause-ip-info   { color:#334455; font-size:10px; margin-bottom:14px; text-align:center; }

    /* ── Overlay Código de Sala ── */
    #join-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
      z-index:600; align-items:center; justify-content:center;
      font-family:monospace;
    }
    #join-overlay.active { display:flex; }
    #join-modal {
      background:#0d1122; border:2px solid #2244aa; border-radius:14px;
      padding:36px 44px; text-align:center; min-width:340px;
    }
    #join-modal h3 { color:#ffffff; font-size:20px; margin-bottom:22px; letter-spacing:1px; }
    #join-code-input {
      width:100%; padding:14px 0; text-align:center;
      font-family:monospace; font-size:32px; font-weight:bold;
      background:#050a18; color:#4488ff; border:2px solid #2244aa;
      border-radius:8px; letter-spacing:10px; outline:none;
      text-transform:uppercase; margin-bottom:8px;
    }
    #join-code-input::placeholder { color:#223355; letter-spacing:4px; font-size:18px; }
    #join-code-input:focus { border-color:#4488ff; }
    #join-error { color:#ff5555; font-size:12px; min-height:18px; margin:6px 0 14px; }
    #join-modal .jbtn {
      width:100%; padding:11px 0; margin:5px 0;
      font-family:monospace; font-size:15px; cursor:pointer; border-radius:7px;
      font-weight:bold; letter-spacing:1px; border:1px solid;
    }
    #join-confirm-btn { background:#112244; color:#4488ff; border-color:#2244aa; }
    #join-confirm-btn:hover { background:#1a3366; color:#fff; }
    #join-cancel-btn  { background:#110a0a; color:#aa4444; border-color:#441111; }
    #join-cancel-btn:hover { background:#221111; }

    /* ── Controles Touch (mobile) ── */
    #touch-controls {
      display:flex; position:fixed; bottom:0; left:0; right:0;
      justify-content:space-between; align-items:flex-end;
      padding:12px 16px 18px; z-index:300; pointer-events:none;
      /* só exibido em touch devices via JS */
    }

    #tc-dpad {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      pointer-events:all;
    }
    .tc-row {
      display:flex; align-items:center; gap:2px;
    }
    .tc-empty { width:56px; height:56px; }

    #tc-actions {
      display:flex; flex-direction:column; align-items:flex-end; gap:8px;
      pointer-events:all;
    }

    .tc-btn {
      width:56px; height:56px;
      background:rgba(20,40,80,0.75);
      color:#88bbff;
      border:2px solid rgba(60,100,200,0.6);
      border-radius:14px;
      font-size:22px;
      font-family:monospace;
      font-weight:bold;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      transition:background 0.08s, transform 0.06s;
      touch-action:none;
    }
    .tc-btn.tc-mid { align-self:center; }

    .tc-btn.tc-action {
      width:80px; height:56px;
      font-size:13px;
      letter-spacing:1px;
      border-radius:16px;
    }
    .tc-btn.tc-shoot {
      background:rgba(80,20,20,0.75);
      color:#ff8888;
      border-color:rgba(200,60,60,0.6);
    }

    .tc-btn.tc-pressed,
    .tc-btn:active {
      background:rgba(60,120,255,0.5);
      transform:scale(0.92);
      color:#ffffff;
      border-color:#4488ff;
    }
    .tc-btn.tc-shoot.tc-pressed,
    .tc-btn.tc-shoot:active {
      background:rgba(255,80,80,0.5);
      border-color:#ff4444;
    }

    /* ── Landscape pequeno (phones): botões menores p/ não cobrir gameplay ── */
    @media (orientation: landscape) and (max-height: 460px) {
      .tc-btn        { width:48px; height:48px; font-size:18px; border-radius:11px; }
      .tc-empty      { width:48px; height:48px; }
      .tc-btn.tc-action { width:68px; height:48px; font-size:11px; }
      #tc-dpad       { gap:1px; }
      .tc-row        { gap:1px; }
      #touch-controls { padding:6px 10px 10px; }
    }

    /* ── Overlay "vire o dispositivo" — aparece em portrait em telas touch ── */
    #rotate-overlay {
      display:none;
      position:fixed; inset:0; z-index:9999;
      background:#030510;
      flex-direction:column;
      align-items:center; justify-content:center;
      font-family:monospace; color:#4488ff;
      text-align:center; padding:32px;
    }
    #rotate-overlay .rot-icon { font-size:64px; margin-bottom:20px; animation:rotpulse 1.4s ease-in-out infinite; }
    #rotate-overlay p { font-size:18px; color:#aabbcc; line-height:1.5; }
    @keyframes rotpulse { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

    /* Mostra overlay em portrait se for touch device (detectado via JS na classe body) */
    body.is-touch #rotate-overlay {
      display:none; /* padrão escondido */
    }
    @media (orientation: portrait) {
      body.is-touch #rotate-overlay { display:flex; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.167.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>

  <!-- Overlay "vire o dispositivo" -->
  <div id="rotate-overlay">
    <div class="rot-icon">📱</div>
    <p>Toque aqui e vire o dispositivo<br>para <strong>horizontal</strong><br>para jogar</p>
  </div>

  <!-- HUD in-game -->
  <div id="hud">
    <div id="hud-health"></div>
    <div id="hud-coins"></div>
    <div id="hud-level"></div>
    <div id="hud-msg"></div>
    <div id="hud-ability-label">0%</div>
    <div id="hud-ability-wrap"><div id="hud-ability"></div></div>
    <div id="hud-room"></div>
    <div id="hud-xp" style="position:absolute;bottom:14px;left:18px;font-size:10px;color:#8899aa;"></div>
  </div>

  <!-- Botão pausa (visível só no GameScene) -->
  <button id="pause-btn" onclick="window.togglePause && window.togglePause()">⏸</button>

  <!-- Overlay pausa -->
  <div id="pause-overlay">
    <h2>⏸ PAUSADO</h2>
    <div id="pause-room-info"></div>
    <div id="pause-ip-info"></div>
    <button class="p-btn" onclick="window.togglePause && window.togglePause()">▶ Continuar</button>
    <button class="p-btn" onclick="window.pauseGoShop && window.pauseGoShop()">🛒 Loja</button>
    <button class="p-btn" onclick="window.pauseChangeSkin && window.pauseChangeSkin()">👤 Trocar Skin</button>
    <button class="p-btn danger" onclick="window.pauseExitGame && window.pauseExitGame()">← Sair ao Menu</button>
  </div>

  <!-- Overlay entrada de código de sala -->
  <div id="join-overlay">
    <div id="join-modal">
      <h3>🌐 ENTRAR EM SALA</h3>
      <input id="join-code-input" type="text" maxlength="6"
             placeholder="XXXXXX" autocomplete="off"
             autocapitalize="characters" spellcheck="false" />
      <div id="join-error"></div>
      <button class="jbtn" id="join-confirm-btn">ENTRAR NA SALA</button>
      <button class="jbtn" id="join-cancel-btn">CANCELAR</button>
    </div>
  </div>

  <!-- Controles touch (D-pad virtual) — visível só em dispositivos touch via TouchControls.js -->
  <div id="touch-controls" style="display:none">
    <div id="tc-dpad">
      <div class="tc-row">
        <button class="tc-btn tc-mid" id="tc-up">▲</button>
      </div>
      <div class="tc-row">
        <button class="tc-btn" id="tc-left">◀</button>
        <div class="tc-empty"></div>
        <button class="tc-btn" id="tc-right">▶</button>
      </div>
      <div class="tc-row">
        <button class="tc-btn tc-mid" id="tc-down">▼</button>
      </div>
    </div>
    <div id="tc-actions">
      <button class="tc-btn tc-action" id="tc-jump">PULAR</button>
      <button class="tc-btn tc-action tc-shoot" id="tc-shoot">ATIRAR</button>
    </div>
  </div>

  <script>
    const _isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (_isTouch) document.body.classList.add('is-touch');

    // Ao primeiro toque: entra em fullscreen e trava landscape
    async function _forceLandscape() {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen)            await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      } catch(e) {}
      try {
        if (screen.orientation && screen.orientation.lock)
          await screen.orientation.lock('landscape');
      } catch(e) {}
    }

    if (_isTouch) {
      // Executa na primeira interação (exigência dos browsers)
      document.addEventListener('touchstart', _forceLandscape, { once: true });
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
